name: Ship Happens!
subtitle: Technical art on the tightest schedule
year: '2026'
description: "I decided to participate in the oldest running game jam in existence - Ludum Dare - together with a few friends. Joined with a 2D illustrator, another programmer and a musical producer, my skills as a technical artist (and additional programming) went into game development on a tight 72-hour deadline. After a lot of prototyping, discussions, too little sleep and quite some fun playtesting we managed to finish a surprisingly fun nifty little game!"

